<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Webpage</title>
    <style>
        /* CSS Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #1a73e8;
            margin-bottom: 1rem;
        }
        p {
            color: #5f6368;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
            border: 3px solid #e8f0fe;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #1a73e8;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }
        .btn:hover {
            background-color: #1557b0;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Placeholder Image -->
        <img src="https://via.placeholder.com/150" alt="Sample Image" class="profile-img">
        
        <h1>Hello, World!</h1>
        <p>This is a simple webpage built with HTML and CSS. It's fully responsive and serves as a perfect starting point for your web journey.</p>

        <button class="btn" onclick="showMessage()">Click Me</button>
    </div>

    <script>
        /* JavaScript Interaction */
        function showMessage() {
            alert('You clicked the button! Have a wonderful day!');
        }
    </script>

</body>
</html>
